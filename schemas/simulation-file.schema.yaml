$schema: "https://json-schema.org/draft/2020-12/schema"
title: Smallville Simulation File
description: Descriptive schema for scenario simulation.yaml files matching the current SimulationFile contract. This documents supported fields only and does not add engine enforcement.
type: object
additionalProperties: false
$defs:
  stringList:
    type: array
    items:
      type: string
  locationSeed:
    type: object
    additionalProperties: false
    properties:
      name:
        type: string
      state:
        type:
          - string
          - "null"
      objects:
        type: array
        items:
          $ref: "#/$defs/locationSeed"
    required:
      - name
  worldSeed:
    type: object
    additionalProperties: false
    properties:
      locations:
        type: array
        items:
          $ref: "#/$defs/locationSeed"
    required:
      - locations
  agentSeed:
    type: object
    additionalProperties: false
    properties:
      name:
        type: string
      memories:
        $ref: "#/$defs/stringList"
      persona:
        $ref: "#/$defs/stringList"
      workingMemories:
        $ref: "#/$defs/stringList"
      goals:
        $ref: "#/$defs/stringList"
      rituals:
        $ref: "#/$defs/stringList"
      activity:
        type:
          - string
          - "null"
      location:
        type:
          - string
          - "null"
      traits:
        type:
          - string
          - "null"
      model:
        type:
          - string
          - "null"
      socialPreference:
        type:
          - string
          - "null"
      canProposeWorldChanges:
        type: boolean
    required:
      - name
  worldBuildingSeed:
    type: object
    additionalProperties: false
    properties:
      summary:
        type:
          - string
          - "null"
      rules:
        $ref: "#/$defs/stringList"
      allowedLocationStates:
        $ref: "#/$defs/stringList"
  dailyRhythmSeed:
    type: object
    additionalProperties: false
    properties:
      breakfast:
        type:
          - string
          - "null"
      lunch:
        type:
          - string
          - "null"
      dinner:
        type:
          - string
          - "null"
      morningTea:
        type:
          - string
          - "null"
      afternoonTea:
        type:
          - string
          - "null"
      snack:
        type:
          - string
          - "null"
properties:
  world:
    $ref: "#/$defs/worldSeed"
  agents:
    type: array
    items:
      $ref: "#/$defs/agentSeed"
  worldBuilding:
    $ref: "#/$defs/worldBuildingSeed"
  dailyRhythm:
    $ref: "#/$defs/dailyRhythmSeed"
required:
  - world
  - agents
