reactions:
  conversation: |
    {{agent.summary}}
    {{other.summary}}

    Create a short natural conversation between {{agent.name}} and {{other.name}} only if it feels natural.
    Topic: {{observation}}

    Return either no text at all or only dialogue lines in this format:
    {{agent.name}}: ...
    {{other.name}}: ...

    Keep it grounded, optional, and brief.
    Write 4 to 8 lines total when a conversation happens.
    Do not add narration or extra commentary.

  say: |
    {{agent.summary}}


    {{observation}}

    What would {{agent.name}} say?
    Reply with one short line only. Do not add quotes or the speaker name.

  reaction: |
    {{world.description}}
    {{agent.summary}}

    Plans: {{#agent.plans}}{{description}}; {{/agent.plans}}
    Relevant Memories: {{#memories.relevant}}{{description}}; {{/memories.relevant}}

    Decide whether {{agent.name}} should change plans because of the observation.

    Return exactly these lines and nothing else:
    Reasoning: one concise reason
    Answer: Yes or No
    Conversation: Yes or No

    Observation: {{observation}}

world:
  objectStates: |
    {{world.description}}

    {{tenses}}

    What are the new states of the objects?
    Return only changed objects as `Object: State` lines.
    If nothing changes, return no lines.

    For example:
    House has coffee machine and a shower;

    you are no longer cooking coffee and are now taking a shower

    Coffee Machine: Off
    Shower: On

  proposal: |
    {{world.description}}
    {{agent.summary}}

    Current activity: {{agent.activity}}
    Goals: {{#agent.goals}}{{.}}; {{/agent.goals}}
    Rituals: {{#agent.rituals}}{{.}}; {{/agent.rituals}}
    World-building frame: {{worldBuilding.summary}}
    Rules: {{#worldBuilding.rules}}{{.}}; {{/worldBuilding.rules}}

    Decide whether {{agent.name}} wants to propose one grounded world change.
    Allowed proposal types only: add_location, add_object, change_state
    Do not suggest deleting, renaming, removing, or breaking anything.
    Keep the proposal domestic, garden-scale, and plausible inside the current world.

    Return exactly these lines and nothing else:
    Answer: Yes or No
    Type: add_location | add_object | change_state
    ParentLocation: exact existing location or blank
    Name: proposed object/location name or target location name
    ProposedState: short state or blank
    Reason: one concise reason grounded in the agent's goals, rituals, or current work

plans:
  shortTerm: |
    {{world.description}}
    {{agent.summary}}
    Daily Rhythm: breakfast {{dailyRhythm.breakfast}}, lunch {{dailyRhythm.lunch}}, dinner {{dailyRhythm.dinner}}, morning tea {{dailyRhythm.morningTea}}, afternoon tea {{dailyRhythm.afternoonTea}}, snack {{dailyRhythm.snack}}
    Daily Requirement: {{#agent.plans}}{{description}};{{/agent.plans}}
    Relevant Memories: {{#memories.relevant}}{{description}}; {{/memories.relevant}}
    Observation: {{observation}}

    Break down {{agent.name}}'s plan for the next hour starting at the current time.
    Keep the actions grounded in the existing world and current relationships.
    Respect the daily rhythm softly rather than rigidly.
    Morning plans should lean toward waking, tea, breakfast, light snacks, tending, sketching, or setup work.
    Dinner should stay in the evening unless there is a very clear reason otherwise.
    Use only the available locations and copy the chosen location name exactly.
    Return only plan lines with no bullets, numbering, or commentary.
    Use one line per plan.
    Start every line with a time in `h:mm a` format.
    Keep each line short and practical.

    The current time is {{date.time}}

  longTerm: |
    {{world.description}}
    {{agent.summary}}
    Daily Rhythm: breakfast {{dailyRhythm.breakfast}}, lunch {{dailyRhythm.lunch}}, dinner {{dailyRhythm.dinner}}, morning tea {{dailyRhythm.morningTea}}, afternoon tea {{dailyRhythm.afternoonTea}}, snack {{dailyRhythm.snack}}
    Relevant Memories: {{#memories.relevant}}{{description}}; {{/memories.relevant}}
    Observation ({{date.time}}): {{observation}}

    * Only use the available locations
    * Copy location names exactly from the available locations list
    * Include the time {{agent.name}} wakes up and falls asleep
    * Let goals, rituals, and personality shape the day
    * Keep meals plausible for the time of day and treat the rhythm as a soft preference, not a rigid obligation
    * Return only plan lines
    * Use one line per plan
    * Start every line with a time in `h:mm a` format

    Example of a plan:
    8:00 am at the Oak Hill College Dorm: Klaus Mueller's room: bed, wake up and get ready for school;
    9:00 am at the Oak Hill College Dorm: Klaus Mueller's room: desk, read and take notes for research paper;
    5:00 pm at the Oak Hill College Dorm: Kitchen, get ready for dinner
    10:00 pm at the Oak Hill College Dorm: Klaus Mueller's room: bathroom, get ready for bed

    Today is Wednesday February 13. Here is {{agent.name}}'s
    plan today in broad strokes:

  current: |
    {{world.description}}
    {{agent.summary}}
    Schedule: {{#agent.shortPlans}}{{description}}; {{/agent.shortPlans}}
    Recent Memories: {{#agent.recentMemories}}{{description}}; {{/agent.recentMemories}}
    Daily Rhythm: breakfast {{dailyRhythm.breakfast}}, lunch {{dailyRhythm.lunch}}, dinner {{dailyRhythm.dinner}}, morning tea {{dailyRhythm.morningTea}}, afternoon tea {{dailyRhythm.afternoonTea}}, snack {{dailyRhythm.snack}}

    * Keep the response grounded in the current world frame and relationships
    * The location should always include a leaf location or object chosen from the available locations
    * Copy the location exactly from the available locations list
    * Do not add notes, parentheses, or invented locations
    * Honor the agent's rituals, goals, and social preference
    * Do not force conversation just because another agent is nearby
    * Morning activity should not describe making dinner unless the context explicitly demands it
    * Return exactly three lines and nothing else
    * Use this format:
    Activity: ...
    Location: ...
    Emoji: one emoji or one short ASCII label

    What is your activity at {{date.time}}?

    For example:
    Activity: swimming laps in the pool
    Location: Gym: Swimming Pool
    Emoji: swimmer

    Activity: ...
    Location: ...
    Emoji: ...

agent:
  reflectionResult: |
    Statements about {{agent.name}}
    {{statements}}
    What single high-level insight can you infer from
    the above statements? (example format: insight (because of 1, 5, 3))

  reflectionQuestion: |
    {{#agent.recentMemories}}
    - {{description}}
    {{/agent.recentMemories}}
    Given only the information above, what are 3 most salient high-level questions we can answer about the subjects in the statements?
    Return exactly 3 lines and start each line with `- `.

  characteristics: |
    How would one describe {{agent.name}}'s core characteristics in 3 words
    given the following statements?
    {{#memories.characteristics}}
     - {{description}}
    {{/memories.characteristics}}
    Respond with exactly three short comma-separated traits.

  summary: |
    Pretend you are {{agent.name}}

    Name: {{agent.name}}
    Innate Traits: {{agent.traits}}
    Characteristics: {{agent.description}}
    Active Continuity: {{#agent.workingMemories}}{{description}}; {{/agent.workingMemories}}
    Current Location: {{agent.locationName}}
    Goals: {{#agent.goals}}{{.}}; {{/agent.goals}}
    Rituals: {{#agent.rituals}}{{.}}; {{/agent.rituals}}
    Social Preference: {{agent.socialPreference}}
    Preferred Model: {{agent.model}}

    {{date.full}}

  askQuestion: |
    {{agent.summary}}
    {{memories.relevant}}

    Pretend you are answering questions from a news reporter. It is currently {{date.full}}

    The news reporter has asked you: {{question}}
    Answer in first person using 2 to 4 sentences.

misc:
  combineSentences: |
    {{agent.name}}'s current status: {{agent.activity}}
    {{agent.name}}'s past status: {{agent.lastActivity}}

    Format the current and past activity to say x is no longer {past status} and is now {current status}
  rankMemories: |
    On the scale of 1 to 10, where 1 is purely mundane
    (e.g., brushing teeth, making bed) and 10 is extremely poignant (e.g., a break up, college
    acceptance), rate the likely poignancy of the following pieces of memory. Always answer with only a list of numbers. For example, if given the following memories Memories: John did nothing; John lin went to school; John lin saw a concert
    respond with [1, 2, 6]. If just given one memory still respond in a list. Return valid JSON only. Memories are separated by semi colans (;)

    Memories: {{#memories.unranked}}{{description}}; {{/memories.unranked}}

  debug: |
    ping: {{ping}}
    memories.characteristics: {{memories.characteristics}}
    tenses: {{tenses}}
    question: {{question}}
    world.description: {{world.description}}
    date.yesterday: {{date.yesterday}}
    date.time: {{date.time}}
    date.full: {{date.full}}
    memories.relevant: {{#memories.relevant}}{{description}}; {{/memories.relevant}}
    memories.characteristics: {{#memories.characteristics}}{{description}}; {{/memories.characteristics}}
    memories.unranked: {{#memories.unranked}}{{description}}; {{/memories.unranked}}
    agent.plans: {{#agent.plans}}{{description}}; {{/agent.plans}}
    agent.locationChildren: {{agent.locationChildren}}
    agent.locationName: {{agent.locationName}}
    agent.description: {{agent.description}}
    agent.lastActivity: {{agent.lastActivity}}
    agent.memories: {{#agent.memories}}{{description}}; {{/agent.memories}}
    agent.name: {{agent.name}}
    agent.plansBlock: {{agent.plansBlock}}
