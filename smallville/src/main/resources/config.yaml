# Local Ollama defaults using the OpenAI-compatible chat completions endpoint.
# Override this with your hosted provider URL if you want to use an API key.
apiPath: http://localhost:11434/v1/chat/completions
# Choose a locally installed Ollama model. `llama3.2:3b-16k` is already available on this machine.
model: llama3.2:3b-16k
timeFormat: h:mm a
fullTimeFormat: EEEE, MMMM d, h:mm a
yesterdayFormat: EEEE MMMM d
#The weighted sum of recent memories to trigger a reflection. This value
#depends on how many memories are added each time step and should only be
#triggered 3-5 times per simulated day
reflectionCutoff: 50
#Set to true if the simulation.yaml file should be used to initialize the simulation
simulationFile: false
# How many times the LLM client should attempt to send a prompt before aborting
maxRetries: 2
